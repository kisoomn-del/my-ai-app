<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 분석 플랫폼</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 36px;
      max-width: 760px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #111; }
    p.sub { font-size: 14px; color: #888; margin-bottom: 28px; }
    textarea {
      width: 100%;
      height: 140px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #4f46e5; }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .result {
      margin-top: 28px;
      background: #f8f8ff;
      border-left: 4px solid #4f46e5;
      border-radius: 8px;
      padding: 20px;
      font-size: 15px;
      line-height: 1.8;
      color: #222;
      white-space: pre-wrap;
      display: none;
    }
    .loading { color: #888; font-style: italic; }
    .error { border-left-color: #ef4444; background: #fff5f5; color: #b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI 분석 플랫폼</h1>
    <p class="sub">텍스트나 데이터를 입력하면 AI가 분석 보고서를 작성합니다.</p>
    <textarea id="inputText" placeholder="분석할 내용을 입력하세요..."></textarea>
    <button id="analyzeBtn" onclick="analyze()">분석 시작</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    // ⬇ 여기에 API 키를 임시로 넣을 수 있지만, 배포 시 환경변수를 사용하세요 (6단계 참고)
    const API_KEY = "여기에_API_키_입력"; // ← 나중에 교체

    async function analyze() {
      const text = document.getElementById("inputText").value.trim();
      const btn = document.getElementById("analyzeBtn");
      const result = document.getElementById("result");

      if (!text) { alert("내용을 입력해주세요."); return; }

      btn.disabled = true;
      btn.textContent = "분석 중...";
      result.style.display = "block";
      result.className = "result loading";
      result.textContent = "AI가 분석 중입니다. 잠시만 기다려주세요...";

      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `당신은 전문 분석가입니다. 다음 내용을 분석하고 한국어로 구조화된 보고서를 작성해주세요:\n\n${text}`
                }]
              }]
            })
          }
        );

        const data = await response.json();
        if (data.candidates && data.candidates[0]) {
          result.className = "result";
          result.textContent = data.candidates[0].content.parts[0].text;
        } else {
          throw new Error("응답 오류");
        }
      } catch (e) {
        result.className = "result error";
        result.textContent = "오류가 발생했습니다. API 키를 확인해주세요.\n" + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "분석 시작";
      }
    }
  </script>
</body>
</html>
